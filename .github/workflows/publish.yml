name: Publish to PyPI

# Manual-only — opt in to PyPI publish.
#
# Why not auto-trigger on tag push?
#   build.yml already publishes a GitHub Release on every tag. PyPI publish
#   needs a one-time PyPI trusted-publisher setup
#   (https://pypi.org/manage/account/publishing/). Until that's configured
#   for `automate-hub`, auto-tag-publish would fail noisily.
#
# When ready:
#   Actions → Publish to PyPI → Run workflow

on:
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC trusted publisher

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
