name: Build & Release

# Manual trigger:
#   Actions → Build & Release → Run workflow → version (e.g. 1.1.0)
#
# What it does:
#   1. tag the commit (v1.1.0)
#   2. build a self-contained binary on Windows / macOS / Linux in parallel
#   3. zip the browser extension folder
#   4. attach all artifacts to a GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "version, e.g. 1.1.0 (no v prefix)"
        required: true

permissions:
  contents: write

jobs:
  tag:
    name: Create tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const raw = '${{ inputs.version }}'.trim();
            const tag = raw.startsWith('v') ? raw : `v${raw}`;
            await github.rest.git.createRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: `refs/tags/${tag}`, sha: context.sha,
            });
            core.setOutput('tag', tag);

  build:
    name: Build · ${{ matrix.name }}
    needs: tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            ext: zip
          - os: macos-latest
            name: macos-arm64
            ext: zip
          - os: ubuntu-22.04
            name: linux-x64
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install autoMate (server + mcp + browser, skip desktop on CI)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[mcp,browser]'
          pip install pyinstaller>=6.0

      - name: Build with PyInstaller
        run: pyinstaller packaging/automate.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\automate -DestinationPath autoMate-${{ matrix.name }}.${{ matrix.ext }}
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../autoMate-${{ matrix.name }}.${{ matrix.ext }} automate
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf autoMate-${{ matrix.name }}.${{ matrix.ext }} -C dist automate

      - uses: actions/upload-artifact@v4
        with:
          name: autoMate-${{ matrix.name }}
          path: autoMate-${{ matrix.name }}.${{ matrix.ext }}
          retention-days: 7

  extension:
    name: Pack browser extension
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: zip -r autoMate-extension.zip extension
      - uses: actions/upload-artifact@v4
        with:
          name: autoMate-extension
          path: autoMate-extension.zip

  release:
    name: Publish Release
    needs: [tag, build, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          name: "autoMate ${{ needs.tag.outputs.tag }}"
          tag_name: ${{ needs.tag.outputs.tag }}
          files: |
            artifacts/autoMate-windows-x64/autoMate-windows-x64.zip
            artifacts/autoMate-macos-arm64/autoMate-macos-arm64.zip
            artifacts/autoMate-linux-x64/autoMate-linux-x64.tar.gz
            artifacts/autoMate-extension/autoMate-extension.zip
          generate_release_notes: true
          body: |
            ## Install

            **Pip (recommended)**

            ```bash
            pip install 'automate-hub[full]'
            automate serve
            ```

            **Standalone binaries** — no Python required.

            | OS | file |
            |----|------|
            | Windows x64 | `autoMate-windows-x64.zip` |
            | macOS Apple Silicon | `autoMate-macos-arm64.zip` |
            | Linux x64 | `autoMate-linux-x64.tar.gz` |

            Unzip and run `./automate/automate serve`. The browser opens to
            `http://127.0.0.1:8765`.

            **Browser extension** — `autoMate-extension.zip`. Unzip, then in
            Chrome go to `chrome://extensions` → Developer mode → Load
            unpacked → select the folder.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
