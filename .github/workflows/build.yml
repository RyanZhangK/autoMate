name: Build & Release

# Triggers:
#   1. Push a tag like v1.0.0  →  full Win/Mac/Linux build + GitHub Release
#   2. Manual: Actions → Run workflow → version (creates the tag for you)

on:
  push:
    tags:
      - "v*"
    branches:
      # Push a branch named release-vX.Y.Z to trigger a release. The workflow
      # creates the tag, builds, publishes, and deletes the branch on success.
      # Useful when your tooling can push branches but not tags.
      - "release-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "version, e.g. 1.0.0 (workflow creates the tag and runs)"
        required: true

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch)
              raw="${INPUT_VERSION#v}"
              tag="v${raw}"
              ;;
            push)
              if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                tag="${GITHUB_REF_NAME}"
              elif [[ "$GITHUB_REF_NAME" == release-v* ]]; then
                tag="${GITHUB_REF_NAME#release-}"
              else
                echo "unsupported ref: $GITHUB_REF" >&2; exit 1
              fi
              ;;
            *) echo "unsupported event: $GITHUB_EVENT_NAME" >&2; exit 1 ;;
          esac

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag"
            git push origin "$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "trigger_branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  build:
    name: Build · ${{ matrix.name }}
    needs: resolve
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            ext: zip
          - os: macos-latest
            name: macos-arm64
            ext: zip
          - os: ubuntu-22.04
            name: linux-x64
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install autoMate (server + mcp)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[mcp]'
          pip install pyinstaller>=6.0

      - name: Build with PyInstaller
        run: pyinstaller packaging/automate.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\automate -DestinationPath autoMate-${{ matrix.name }}.${{ matrix.ext }}
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../autoMate-${{ matrix.name }}.${{ matrix.ext }} automate
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf autoMate-${{ matrix.name }}.${{ matrix.ext }} -C dist automate

      - uses: actions/upload-artifact@v4
        with:
          name: autoMate-${{ matrix.name }}
          path: autoMate-${{ matrix.name }}.${{ matrix.ext }}
          retention-days: 7

  extension:
    name: Pack browser extension
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: zip -r autoMate-extension.zip extension
      - uses: actions/upload-artifact@v4
        with:
          name: autoMate-extension
          path: autoMate-extension.zip

  wheel:
    name: Build wheel + sdist
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: autoMate-pypi
          path: dist/*

  release:
    name: Publish Release
    needs: [resolve, build, extension, wheel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: List artifacts
        run: find artifacts -type f -printf '%p  (%s bytes)\n'
      - uses: softprops/action-gh-release@v2
        with:
          name: "autoMate ${{ needs.resolve.outputs.tag }}"
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: |
            artifacts/autoMate-windows-x64/autoMate-windows-x64.zip
            artifacts/autoMate-macos-arm64/autoMate-macos-arm64.zip
            artifacts/autoMate-linux-x64/autoMate-linux-x64.tar.gz
            artifacts/autoMate-extension/autoMate-extension.zip
            artifacts/autoMate-pypi/*.whl
            artifacts/autoMate-pypi/*.tar.gz
          generate_release_notes: true
          body: |
            ## Install

            **Standalone binaries — no Python required**

            | OS | file |
            |----|------|
            | Windows x64 | `autoMate-windows-x64.zip` |
            | macOS Apple Silicon | `autoMate-macos-arm64.zip` |
            | Linux x64 | `autoMate-linux-x64.tar.gz` |

            Unzip and run `./automate/automate serve`. The browser opens to
            `http://127.0.0.1:8765`.

            **pip**

            ```bash
            pip install 'automate-hub[full]'
            automate serve
            ```

            **Docker**

            ```bash
            docker run --rm -p 8765:8765 -v automate-data:/data \
              ghcr.io/yuruotong1/automate:latest
            ```

            **Browser extension** — `autoMate-extension.zip`. Unzip, then
            `chrome://extensions` → Developer mode → Load unpacked → pick the
            folder. The toolbar badge flips to **ON** when paired.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete trigger branch (if any)
        if: startsWith(needs.resolve.outputs.trigger_branch, 'release-v')
        run: |
          git push origin --delete "${{ needs.resolve.outputs.trigger_branch }}" || true
